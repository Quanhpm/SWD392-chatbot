<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Smart RAG Learning Platform Use Case Summary</title>
  <desc id="desc">Current Teacher and Student use-case summary. Render docs/use-case-diagram.puml for the full editable diagram.</desc>
  <style>
    .bg { fill: #f7fafd; }
    .card { fill: #ffffff; stroke: #727785; stroke-width: 1.5; rx: 18; }
    .title { font: 700 26px Arial, sans-serif; fill: #123047; }
    .subtitle { font: 15px Arial, sans-serif; fill: #414754; }
    .actor { font: 700 18px Arial, sans-serif; fill: #006a61; }
    .text { font: 14px Arial, sans-serif; fill: #243447; }
    .rule { font: 700 15px Arial, sans-serif; fill: #9a3412; }
    .arrow { stroke: #414754; stroke-width: 2; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#414754"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="420"/>
  <text class="title" x="40" y="48">Smart RAG Learning Platform</text>
  <text class="subtitle" x="40" y="76">Use-case source of truth: docs/use-case-diagram.puml</text>

  <rect class="card" x="40" y="120" width="250" height="180"/>
  <text class="actor" x="65" y="155">Teacher</text>
  <text class="text" x="65" y="190">• Create own subjects</text>
  <text class="text" x="65" y="218">• Upload own documents</text>
  <text class="text" x="65" y="246">• Delete owned content</text>
  <text class="text" x="65" y="274">• Approve paid upgrades</text>

  <rect class="card" x="345" y="120" width="270" height="180"/>
  <text class="actor" x="370" y="155">Student</text>
  <text class="text" x="370" y="190">• Enroll with subject password</text>
  <text class="text" x="370" y="218">• Read enrolled documents</text>
  <text class="text" x="370" y="246">• Chat inside one document</text>
  <text class="text" x="370" y="274">• Request subscription upgrade</text>

  <rect class="card" x="670" y="120" width="250" height="180"/>
  <text class="actor" x="695" y="155">Core Rule</text>
  <text class="rule" x="695" y="190">5 free questions</text>
  <text class="text" x="695" y="218">per student per document</text>
  <text class="text" x="695" y="246">Question #6 requires</text>
  <text class="text" x="695" y="274">an upgraded plan</text>

  <line class="arrow" x1="290" y1="210" x2="345" y2="210"/>
  <line class="arrow" x1="615" y1="210" x2="670" y2="210"/>
  <text class="subtitle" x="40" y="360">Gemini generates embeddings, study assist, and answers. MongoDB stores users, subjects, documents, chunks, chat sessions, subscriptions, and quotas.</text>
</svg>
